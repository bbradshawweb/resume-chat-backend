services:
  - type: web
    name: resume-chat-backend
    env: python
    plan: free
    buildCommand: ""
    startCommand: "gunicorn main:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120"
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-nano
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "18"
      - key: RATE_LIMIT_WINDOW_SECONDS
        value: "60"
      - key: NOTIFICATION_ENABLED
        value: "false"
      - key: NOTIFICATION_TO_EMAIL
        value: bradshaw.braden@gmail.com
      - key: NOTIFICATION_FROM_EMAIL
        sync: false
      - key: NOTIFICATION_MIN_SCORE
        value: "7"
      - key: NOTIFICATION_COOLDOWN_SECONDS
        value: "21600"
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_USE_TLS
        value: "true"
